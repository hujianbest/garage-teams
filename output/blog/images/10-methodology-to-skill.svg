<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="sh10" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.1"/>
    </filter>
    <marker id="ar10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="860" height="470" fill="url(#bg10)"/>
  <text x="430" y="40" fill="#0f172a" font-size="20" font-weight="700" text-anchor="middle">方法论 -&gt; Skill / 从操作手册到决策框架</text>
  <text x="430" y="62" fill="#64748b" font-size="13" text-anchor="middle">以 hf-test-driven-dev 为例</text>

  <g filter="url(#sh10)">
    <rect x="40" y="90" width="380" height="340" rx="14" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
    <rect x="40" y="90" width="380" height="40" rx="14" fill="#fee2e2"/>
    <rect x="40" y="116" width="380" height="14" fill="#fee2e2"/>
    <text x="230" y="117" fill="#991b1b" font-size="14" font-weight="700" text-anchor="middle">当成操作手册（错）</text>
    <rect x="60" y="146" width="340" height="40" rx="8" fill="#fef2f2"/>
    <text x="76" y="170" fill="#7f1d1d" font-size="12">直接把 TDD 步骤翻译成 1-2-3-4</text>
    <rect x="60" y="200" width="340" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <g font-family="'Noto Sans Mono CJK SC', 'Noto Sans CJK SC', ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#334155">
      <text x="72" y="222">Step 1: 写测试用例</text>
      <text x="72" y="244">Step 2: 运行测试，看红灯</text>
      <text x="72" y="266">Step 3: 写实现代码</text>
      <text x="72" y="288">Step 4: 再运行测试，看绿灯</text>
      <text x="72" y="310">Step 5: 重构</text>
      <text x="72" y="332">Step 6: 提交</text>
      <text x="72" y="360" fill="#991b1b">AI 读完照做，但没毛病可挑</text>
      <text x="72" y="378" fill="#991b1b">结果跑着跑着就跑偏了</text>
    </g>
    <text x="230" y="412" fill="#7f1d1d" font-size="11" text-anchor="middle">告诉 AI 怎么做，永远不够</text>
  </g>

  <g transform="translate(428 240)">
    <path d="M 0 0 L 30 0" stroke="#f97316" stroke-width="3" marker-end="url(#ar10)" fill="none"/>
    <text x="15" y="-8" fill="#9a3412" font-size="11" text-anchor="middle" font-weight="600">关键</text>
    <text x="15" y="22" fill="#9a3412" font-size="11" text-anchor="middle" font-weight="600">转向</text>
  </g>

  <g filter="url(#sh10)">
    <rect x="470" y="90" width="360" height="340" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="470" y="90" width="360" height="40" rx="14" fill="#dcfce7"/>
    <rect x="470" y="116" width="360" height="14" fill="#dcfce7"/>
    <text x="650" y="117" fill="#166534" font-size="14" font-weight="700" text-anchor="middle">当成决策框架（对）</text>
    <rect x="488" y="146" width="324" height="40" rx="8" fill="#f0fdf4"/>
    <text x="502" y="170" fill="#14532d" font-size="12">告诉 AI 在这个节点做什么判断</text>
    <g font-size="11" fill="#0f172a">
      <rect x="488" y="200" width="324" height="44" rx="6" fill="#fef3c7" stroke="#fde68a"/>
      <text x="498" y="218" fill="#92400e" font-size="11" font-weight="700">Hard Gate</text>
      <text x="498" y="236" fill="#0f172a">没有批准过的任务计划？别进来</text>
      <rect x="488" y="250" width="324" height="44" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="498" y="268" fill="#4338ca" font-size="11" font-weight="700">Workflow</text>
      <text x="498" y="286" fill="#0f172a">留红灯证据 -&gt; 写实现 -&gt; 留绿灯证据</text>
      <rect x="488" y="300" width="324" height="44" rx="6" fill="#fee2e2" stroke="#fecaca"/>
      <text x="498" y="318" fill="#991b1b" font-size="11" font-weight="700">Red Flags</text>
      <text x="498" y="336" fill="#0f172a">改测试让它过而不是改实现 -&gt; 停</text>
      <rect x="488" y="350" width="324" height="44" rx="6" fill="#d1fae5" stroke="#a7f3d0"/>
      <text x="498" y="368" fill="#065f46" font-size="11" font-weight="700">Verification</text>
      <text x="498" y="386" fill="#0f172a">红绿灯证据齐 / 交接信息写好</text>
    </g>
    <text x="650" y="414" fill="#166534" font-size="11" text-anchor="middle" font-weight="600">纪律 / 偏离信号 / 证据</text>
  </g>
</svg>