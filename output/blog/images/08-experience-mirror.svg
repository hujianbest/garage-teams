    <rect x="566" y="138" width="108" height="80" rx="10" fill="#1e293b"/>
    <circle cx="592" cy="168" r="6" fill="#22d3ee"/>
    <circle cx="620" cy="168" r="6" fill="#22d3ee"/>
    <rect x="588" y="188" width="44" height="4" rx="2" fill="#64748b"/>
    <line x1="620" y1="128" x2="620" y2="138" stroke="#475569" stroke-width="2"/>
    <circle cx="620" cy="125" r="4" fill="#fbbf24"/>
    <rect x="538" y="218" width="164" height="16" rx="2" fill="#0f172a"/>
