  <g>
    <path d="M 305 230 L 335 230" stroke="#6366f1" stroke-width="2" marker-end="url(#ar8a)" fill="none"/>
    <path d="M 465 270 L 495 270" stroke="#10b981" stroke-width="2" marker-end="url(#ar8b)" fill="none"/>
