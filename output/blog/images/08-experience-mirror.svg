      <text x="6" y="32" fill="#4338ca" font-size="9">hf-tdd</text>
      <rect x="0" y="40" width="96" height="16" rx="3" fill="#eef2ff"/>
      <text x="6" y="52" fill="#4338ca" font-size="9">hf-code-review</text>
      <rect x="0" y="60" width="96" height="16" rx="3" fill="#eef2ff"/>
      <text x="6" y="72" fill="#4338ca" font-size="9">hf-finalize</text>
      <rect x="0" y="80" width="96" height="16" rx="3" fill="#eef2ff"/>
      <text x="6" y="92" fill="#4338ca" font-size="9">...</text>
