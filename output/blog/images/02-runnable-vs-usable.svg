<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fef3f2"/>
    </linearGradient>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <g filter="url(#sh2)">
    <rect x="60" y="70" width="320" height="320" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="60" y="70" width="320" height="44" rx="14" fill="#22c55e"/>
    <rect x="60" y="100" width="320" height="14" fill="#22c55e"/>
    <text x="220" y="98" fill="#ffffff" font-size="18" font-weight="600" text-anchor="middle">能跑</text>
    <g font-size="13">
      <text x="82" y="146" fill="#0f172a">· 十分钟起项目</text>
      <text x="82" y="174" fill="#0f172a">· 首页能打开</text>
      <text x="82" y="202" fill="#0f172a">· 登录能走通</text>
      <text x="82" y="230" fill="#0f172a">· 数据库连上了</text>
      <text x="82" y="258" fill="#0f172a">· 一次 demo 不会崩</text>
    </g>
    <rect x="80" y="280" width="280" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="96" y="306" fill="#166534" font-size="12">Happy path 测试通过</text>
    <text x="96" y="326" fill="#4d7c0f" font-size="11">登录 / 上传 / 浏览</text>
    <text x="96" y="344" fill="#4d7c0f" font-size="11">评论 / 注销 / 返回</text>
    <text x="96" y="362" fill="#65a30d" font-size="11">产品经理点头就走</text>
  </g>
  <g>
    <text x="400" y="210" fill="#64748b" font-size="12" text-anchor="middle">这道鸿沟里</text>
    <text x="400" y="228" fill="#64748b" font-size="12" text-anchor="middle">藏着真正的工程</text>
    <path d="M 400 245 L 400 280" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  </g>
  <g filter="url(#sh2)">
    <rect x="420" y="70" width="320" height="320" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="420" y="70" width="320" height="44" rx="14" fill="#ef4444"/>
    <rect x="420" y="100" width="320" height="14" fill="#ef4444"/>
    <text x="580" y="98" fill="#ffffff" font-size="18" font-weight="600" text-anchor="middle">不够用</text>
    <g font-size="12">
      <text x="442" y="148" fill="#991b1b">[x] 缩略图生成失败</text>
      <text x="442" y="170" fill="#991b1b">[x] 评论提交不刷新</text>
      <text x="442" y="192" fill="#991b1b">[x] iPhone SE 布局错位</text>
      <text x="442" y="214" fill="#991b1b">[x] 批量上传丢文件</text>
      <text x="442" y="236" fill="#991b1b">[x] 分类筛选排序错误</text>
      <text x="442" y="258" fill="#991b1b">[x] 401 后不回登录页</text>
      <text x="442" y="280" fill="#991b1b">[x] 夜间模式字色死白</text>
    </g>
    <rect x="440" y="298" width="280" height="74" rx="8" fill="#fef2f2" stroke="#fecaca"/>
    <text x="456" y="322" fill="#991b1b" font-size="12">修 A 破 B</text>
    <text x="456" y="342" fill="#991b1b" font-size="12">修 B 破 C</text>
    <text x="456" y="362" fill="#b91c1c" font-size="11">慢性消耗，每次都得全量测</text>
  </g>
  <text x="400" y="424" fill="#475569" font-size="14" text-anchor="middle" font-weight="500">能跑不等于能用</text>
</svg>