      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset="1" stop-color="#f5f5f4"/>
    </linearGradient>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1c1917" flood-opacity="0.12"/>
