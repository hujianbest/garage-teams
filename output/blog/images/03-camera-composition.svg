    <circle cx="140" cy="175" r="60" fill="#020617"/>
    <circle cx="140" cy="175" r="42" fill="#1e293b"/>
    <circle cx="140" cy="175" r="30" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <circle cx="140" cy="175" r="14" fill="#0ea5e9" opacity="0.35"/>
    <circle cx="128" cy="163" r="6" fill="#ffffff" opacity="0.25"/>
