<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0f9ff"/>
    </linearGradient>
    <filter id="sh7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg7)"/>
  <text x="400" y="42" fill="#0f172a" font-size="20" font-weight="700" text-anchor="middle">普通人 vs 摄影师</text>
  <text x="400" y="64" fill="#64748b" font-size="13" text-anchor="middle">差距不在设备，在审美</text>

  <g filter="url(#sh7)">
    <rect x="70" y="100" width="300" height="240" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="82" y="112" width="276" height="200" fill="url(#sky1)"/>
    <rect x="82" y="240" width="276" height="72" fill="#64748b"/>
    <circle cx="220" cy="260" r="26" fill="#475569"/>
    <line x1="82" y1="238" x2="358" y2="244" stroke="#0f172a" stroke-width="1" opacity="0.3"/>
    <text x="220" y="360" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">随手一拍</text>
  </g>
  <g fill="#64748b" font-size="11">
    <text x="88" y="384">· 主体居中</text>
    <text x="88" y="400">· 天色普通</text>
    <text x="88" y="416">· 没有故事</text>
    <text x="230" y="384">· 没做取舍</text>
    <text x="230" y="400">· 没有节奏</text>
    <text x="230" y="416">· 没有风格</text>
  </g>

  <g filter="url(#sh7)">
    <rect x="430" y="100" width="300" height="240" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="442" y="112" width="276" height="160" fill="url(#sky2)"/>
    <circle cx="560" cy="210" r="18" fill="#fef3c7" opacity="0.9"/>
    <rect x="442" y="272" width="276" height="40" fill="#7c2d12" opacity="0.85"/>
    <rect x="442" y="280" width="276" height="2" fill="#fbbf24" opacity="0.7"/>
    <rect x="442" y="288" width="276" height="1" fill="#fbbf24" opacity="0.5"/>
    <rect x="442" y="296" width="276" height="1" fill="#fbbf24" opacity="0.3"/>
    <g transform="translate(620 258)">
      <circle cx="0" cy="0" r="3" fill="#0f172a"/>
      <rect x="-1.5" y="3" width="3" height="10" fill="#0f172a"/>
      <line x1="0" y1="10" x2="-3" y2="18" stroke="#0f172a" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="3" y2="18" stroke="#0f172a" stroke-width="1.5"/>
    </g>
    <circle cx="640" cy="300" r="2" fill="#431407" opacity="0.6"/>
    <circle cx="656" cy="305" r="2" fill="#431407" opacity="0.5"/>
    <circle cx="672" cy="308" r="2" fill="#431407" opacity="0.3"/>
    <line x1="534" y1="112" x2="534" y2="312" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>
    <line x1="626" y1="112" x2="626" y2="312" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>
    <line x1="442" y1="178" x2="718" y2="178" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>
    <line x1="442" y1="246" x2="718" y2="246" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>
    <text x="580" y="360" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">摄影师出片</text>
  </g>
  <g fill="#64748b" font-size="11">
    <text x="448" y="384">· 三分法构图</text>
    <text x="448" y="400">· 等到了光</text>
    <text x="448" y="416">· 有主角有故事</text>
    <text x="590" y="384">· 取舍精准</text>
    <text x="590" y="400">· 暖调统一</text>
    <text x="590" y="416">· 有风格</text>
  </g>
  <text x="400" y="218" fill="#475569" font-size="32" font-weight="300" text-anchor="middle">vs</text>
</svg>