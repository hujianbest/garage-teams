<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fdf4ff"/>
    </linearGradient>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.1"/>
    </filter>
    <marker id="ar5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="url(#bg5)"/>
  <text x="450" y="38" fill="#0f172a" font-size="20" font-weight="700" text-anchor="middle">经典软件工程方法 映射到 AI Harness</text>
  <text x="450" y="60" fill="#64748b" font-size="13" text-anchor="middle">老古董没过时，只是从脑子里搬到了 Agent 里</text>

  <g filter="url(#sh5)">
    <rect x="50" y="90" width="280" height="320" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="50" y="90" width="280" height="38" rx="12" fill="#1e293b"/>
    <rect x="50" y="118" width="280" height="10" fill="#1e293b"/>
    <text x="190" y="115" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">经典软件工程（脑子里）</text>
    <g font-size="12" fill="#334155">
      <rect x="70" y="148" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="168">需求分解 / 规格说明</text>
      <rect x="70" y="186" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="206">TDD / 测试先行</text>
      <rect x="70" y="224" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="244">Fagan 审查 / 同行评审</text>
      <rect x="70" y="262" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="282">ADR / 架构决策记录</text>
      <rect x="70" y="300" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="320">DoD / 完成定义</text>
      <rect x="70" y="338" width="240" height="30" rx="6" fill="#f1f5f9"/>
      <text x="82" y="358">回归测试 / 追溯性</text>
    </g>
    <text x="190" y="392" fill="#64748b" font-size="11" text-anchor="middle">靠会议、文档、Code Review 落地</text>
  </g>

  <g>
    <path d="M 355 250 L 545 250" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#ar5)"/>
    <rect x="370" y="218" width="170" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="455" y="235" fill="#4338ca" font-size="12" font-weight="600" text-anchor="middle">固化 / 封装 / Agent 化</text>
  </g>

  <g filter="url(#sh5)">
    <rect x="570" y="90" width="280" height="320" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="570" y="90" width="280" height="38" rx="12" fill="#4338ca"/>
    <rect x="570" y="118" width="280" height="10" fill="#4338ca"/>
    <text x="710" y="115" fill="#e0e7ff" font-size="14" font-weight="600" text-anchor="middle">AI Harness（Agent 里）</text>
    <g font-size="12" fill="#1e1b4b">
      <rect x="590" y="148" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="168">hf-specify / hf-spec-review</text>
      <rect x="590" y="186" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="206">hf-test-driven-dev</text>
      <rect x="590" y="224" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="244">hf-code-review / hf-test-review</text>
      <rect x="590" y="262" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="282">hf-design / hf-design-review</text>
      <rect x="590" y="300" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="320">hf-completion-gate / hf-finalize</text>
      <rect x="590" y="338" width="240" height="30" rx="6" fill="#eef2ff"/>
      <text x="602" y="358">hf-regression-gate / traceability</text>
    </g>
    <text x="710" y="392" fill="#64748b" font-size="11" text-anchor="middle">靠 Skill / Gate / 证据包落地</text>
  </g>
  <text x="450" y="442" fill="#475569" font-size="14" text-anchor="middle" font-style="italic">AI 软件工程 = AI 编程 + 软件工程方法</text>
</svg>