name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install project + dev deps
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov

      - name: Run pytest (full suite, baseline 1044)
        run: |
          source .venv/bin/activate
          pytest tests/ -q --tb=short

  lint:
    name: ruff (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.1,<0.2"
      - name: Run ruff (non-blocking; v0.2 will tighten)
        run: ruff check src/ tests/

  types:
    name: mypy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mypy + project deps
        run: |
          pip install "mypy>=1.7,<2.0" pyyaml filelock atomicwrites
          pip install -e .
      - name: Run mypy (non-blocking; v0.2 will tighten)
        run: mypy src/
