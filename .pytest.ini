# Pytest configuration for Garage OS
# See: https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
# Allow `pytest` without a prior editable install (src layout).
# Include repo root so tests can `import scripts.*` (e.g. security_audit).
pythonpath = src .

# Test discovery paths
testpaths = tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
